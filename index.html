<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>말씀묵상 — QT Journal</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== MAIN APP ===== -->
<div id="screen-app" class="screen active">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <span class="topbar-logo">✦ 말씀묵상</span>
      <div class="topbar-actions">
        <button class="icon-btn" id="btn-streak" title="스트릭">🔥</button>
        <button class="icon-btn" id="btn-settings-open" title="설정">⚙️</button>
      </div>
    </div>
  </header>

  <!-- STREAK TOAST -->
  <div id="streak-toast" class="streak-toast hidden">
    <span id="streak-text">🔥 연속 묵상 0일째</span>
  </div>

  <!-- PAGES -->
  <main class="main-content">

    <!-- PAGE: CALENDAR -->
    <section id="page-calendar" class="page active">
      <div class="today-banner">
        <div class="today-su-link">
          <a href="https://sum.su.or.kr:8888/bible/today" target="_blank" class="su-btn">
            📖 오늘의 매일성경 열기
          </a>
        </div>
        <div class="today-info">
          <span id="today-label">오늘</span>
          <button class="btn-write-today" id="btn-write-today">오늘 묵상 쓰기 ✦</button>
        </div>
      </div>
      <div class="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span id="cal-title">2025년 1월</span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid">
          <div class="cal-dow">일</div><div class="cal-dow">월</div>
          <div class="cal-dow">화</div><div class="cal-dow">수</div>
          <div class="cal-dow">목</div><div class="cal-dow">금</div>
          <div class="cal-dow">토</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">전체 기록</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-month">0</div><div class="stat-label">이번 달</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">연속 일수</div></div>
      </div>
      <div class="tag-filter-row" id="tag-filter-row">
        <span class="tag-filter-label">태그 필터</span>
        <div id="tag-chips" class="tag-chips"></div>
      </div>
    </section>

    <!-- PAGE: WRITE -->
    <section id="page-write" class="page">
      <div class="write-header">
        <button class="back-btn" id="btn-back-write">← 달력</button>
        <span id="write-date-label">오늘</span>
        <button class="btn-save" id="btn-save">저장</button>
      </div>

      <!-- 말씀 입력 -->
      <div class="verse-input-wrap">
        <div class="verse-row">
          <input type="text" id="verse-ref" placeholder="본문 (예: 롬 8:1-17)" class="verse-ref-input">
          <a href="https://sum.su.or.kr:8888/bible/today" target="_blank" class="btn-fetch-verse">📖 매일성경</a>
        </div>
        <textarea id="verse-text" class="verse-text" placeholder="말씀을 여기에 붙여 넣으세요" rows="3"></textarea>
      </div>

      <!-- 태그 -->
      <div class="tag-input-wrap">
        <input type="text" id="tag-input" placeholder="태그 추가 (엔터로 입력, 예: 은혜)" class="tag-input">
        <div id="current-tags" class="current-tags"></div>
      </div>

      <!-- 묵상 탭 -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="creative">🔭 낯설게</button>
        <button class="tab-btn" data-tab="inductive">📖 귀납적</button>
        <button class="tab-btn" data-tab="sermon">🎙️ 강해</button>
        <button class="tab-btn" data-tab="drawing">🎨 그림</button>
      </div>

      <!-- TAB: 낯설게 보기 -->
      <div class="tab-content active" id="tab-creative">
        <div class="ai-prompt-box" id="ai-prompt-box">
          <div class="ai-prompt-inner">
            <p class="ai-label">✦ AI 묵상 질문</p>
            <div id="ai-questions" class="ai-questions">
              <p class="ai-hint">말씀을 입력하고 AI 질문을 받아보세요</p>
            </div>
            <button class="btn-ai" id="btn-get-ai">질문 생성하기</button>
          </div>
        </div>
        <textarea class="qt-textarea" id="creative-text" placeholder="낯선 시선으로 이 말씀을 바라보세요. 당신의 감각, 상상, 질문을 자유롭게 기록하세요." rows="8"></textarea>
      </div>

      <!-- TAB: 귀납적 -->
      <div class="tab-content" id="tab-inductive">
        <div class="inductive-section">
          <div class="ind-label">👁 관찰 <span class="ind-hint">본문에서 무엇을 보았나요?</span></div>
          <textarea class="qt-textarea" id="ind-observe" placeholder="사실, 반복되는 단어, 구조, 인물, 사건..." rows="4"></textarea>
        </div>
        <div class="inductive-section">
          <div class="ind-label">💡 해석 <span class="ind-hint">왜 그런 것일까요?</span></div>
          <textarea class="qt-textarea" id="ind-interpret" placeholder="의미, 배경, 문맥, 신학적 의미..." rows="4"></textarea>
        </div>
        <div class="inductive-section">
          <div class="ind-label">🙏 적용 <span class="ind-hint">내 삶에 어떻게 적용하나요?</span></div>
          <textarea class="qt-textarea" id="ind-apply" placeholder="오늘 구체적으로 실천할 것, 기도제목..." rows="4"></textarea>
        </div>
      </div>

      <!-- TAB: 강해 설교 -->
      <div class="tab-content" id="tab-sermon">
        <div class="sermon-meta">
          <input type="text" class="sermon-input" id="sermon-preacher" placeholder="설교자">
          <input type="text" class="sermon-input" id="sermon-title" placeholder="설교 제목">
          <input type="text" class="sermon-input" id="sermon-date" placeholder="설교 날짜">
        </div>
        <div class="ind-label">📝 설교 메모</div>
        <textarea class="qt-textarea" id="sermon-notes" placeholder="설교 내용 메모..." rows="5"></textarea>
        <div class="ind-label">💭 개인 묵상</div>
        <textarea class="qt-textarea" id="sermon-reflection" placeholder="말씀이 내게 말하는 것, 도전, 감사..." rows="4"></textarea>
      </div>

      <!-- TAB: 그림 -->
      <div class="tab-content" id="tab-drawing">
        <div class="drawing-toolbar">
          <div class="color-swatches">
            <button class="swatch active" data-color="#e8e8e8" style="background:#e8e8e8"></button>
            <button class="swatch" data-color="#7c9fd4" style="background:#7c9fd4"></button>
            <button class="swatch" data-color="#d4a574" style="background:#d4a574"></button>
            <button class="swatch" data-color="#8bc48b" style="background:#8bc48b"></button>
            <button class="swatch" data-color="#d47c7c" style="background:#d47c7c"></button>
            <button class="swatch" data-color="#a07cd4" style="background:#a07cd4"></button>
          </div>
          <div class="draw-tools">
            <input type="range" id="brush-size" min="1" max="20" value="4" class="brush-slider">
            <button class="tool-btn active" id="tool-pen" title="펜">✏️</button>
            <button class="tool-btn" id="tool-eraser" title="지우개">⬜</button>
            <button class="tool-btn" id="btn-clear-canvas" title="전체 지우기">🗑</button>
            <button class="tool-btn" id="btn-save-png" title="PNG 저장">⬇</button>
          </div>
        </div>
        <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
        <p class="drawing-hint">말씀을 그림으로 표현해보세요</p>
      </div>

    </section>

    <!-- PAGE: VIEW -->
    <section id="page-view" class="page">
      <div class="write-header">
        <button class="back-btn" id="btn-back-view">← 달력</button>
        <span id="view-date-label"></span>
        <button class="btn-edit" id="btn-edit-entry">편집</button>
      </div>
      <div id="view-content" class="view-content"></div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="calendar">
      <span class="nav-icon">📅</span>
      <span class="nav-label">달력</span>
    </button>
    <button class="nav-btn" data-page="write-today">
      <span class="nav-icon">✦</span>
      <span class="nav-label">오늘 묵상</span>
    </button>
    <button class="nav-btn" data-page="search">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">검색</span>
    </button>
  </nav>

</div>

<!-- ===== SETTINGS MODAL ===== -->
<div id="modal-settings" class="modal hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h2>설정</h2>
      <button class="modal-close" id="btn-settings-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="setting-user" id="setting-user"></div>
      <div class="setting-section">
        <div class="setting-title">데이터 관리</div>
        <button class="setting-btn" id="btn-backup">📤 JSON 백업 내보내기</button>
        <button class="setting-btn" id="btn-restore">📥 JSON 백업 가져오기</button>
        <input type="file" id="restore-file" accept=".json" style="display:none">
      </div>
      <div class="setting-section">
        <div class="setting-title">기기 데이터</div>
        <button class="setting-btn danger" id="btn-clear-data">🗑 이 기기에서 모든 기록 삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SEARCH MODAL ===== -->
<div id="modal-search" class="modal hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h2>검색</h2>
      <button class="modal-close" id="btn-search-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" id="search-input" class="search-input-modal" placeholder="말씀, 내용, 태그 검색...">
      <div id="search-results" class="search-results"></div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
